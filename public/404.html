<!DOCTYPE html>
<html lang="is">
  <head>
    <meta charset="UTF-8" />
    <title>LániCAD</title>
    <script>
      // GitHub Pages SPA fallback — redirects all 404s to index.html
      // preserving the path so React Router can handle it
      var pathSegmentsToKeep = 1; // /LaniCAD/ = 1 segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
